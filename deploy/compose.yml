# Reference compose stack -- run as a sidecar (e.g. next to bty + withcache).
#
# Usage:
#   cp envvars.example envvars && "${EDITOR:-vi}" envvars   # set NBDMUX_ADMIN_PASSWORD
#   podman compose --env-file envvars up -d
#   #   http://<host>:8082/   (operator UI)
#   #   tcp://<host>:10809    (NBD)

services:
  nbdmux:
    image: ghcr.io/safl/nbdmux:latest
    restart: unless-stopped
    environment:
      NBDMUX_ADMIN_PASSWORD: "${NBDMUX_ADMIN_PASSWORD:-}"
      # Threaded through so the warm-via-src_url path works; unset
      # here means nbdmux logs a startup warning and rejects src_url
      # POSTs. Point at the sibling withcache in the bty integration.
      NBDMUX_WITHCACHE_URL: "${NBDMUX_WITHCACHE_URL:-}"
      # Optional signed-cookie HMAC key; unset = auto-generate + persist.
      NBDMUX_SESSION_SECRET: "${NBDMUX_SESSION_SECRET:-}"
    ports:
      - "${HOST_HTTP_PORT:-8082}:8082"
      - "${HOST_NBD_PORT:-10809}:10809"
    volumes:
      # Persistent: state.db + nbd-server.conf survive restarts here.
      # Also holds warm-created .img files at /data/images/<name>.img
      # (the ``warm via src_url`` path landing under <data-dir>/images).
      - nbdmux-data:/data
      # Read-only bind of the host directory holding pre-warmed .img
      # files the operator has placed on disk out-of-band; registered
      # via POST /exports {name, file}. Warm-created files land
      # inside the nbdmux-data volume above, NOT here.
      - "${IMAGES_HOST_DIR:-./images}:/images:ro"

volumes:
  nbdmux-data:
